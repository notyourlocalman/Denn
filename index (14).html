<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Buat Dennis</title>

<!-- ============================================================
     CUSTOMIZE ME
     Everything you'll want to personalize lives in two places:
     1) The CONFIG block in the <script> near the bottom (names,
        letter text, card meanings).
     2) The two .photo-placeholder blocks in the Sun and Moon cards
        below — replace each one with an <img src="your-photo.jpg">
        to put a real picture on the back of the card.
     You almost never need to touch the CSS/animation code below.
     ============================================================ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg-deep: #05061a;
    --bg-mid: #0b0e2e;
    --bg-soft: #131a40;
    --star-white: #f6f4ff;
    --gold: #d9b878;
    --gold-soft: #e8d3a4;
    --red-bloom: #e8344a;
    --red-bloom-2: #ff5d72;
    --red-glow: rgba(232, 52, 74, 0.65);
    --moon-silver: #cfd8ec;
    --moon-deep: #8d99c2;
    --sun-amber: #ffb454;
    --sun-deep: #e8702f;
    --paper: #f3ead8;
    --ink: #3a2c22;
  }

  *{ box-sizing: border-box; }

  html{ scroll-behavior: smooth; }

  body{
    margin:0;
    background: var(--bg-deep);
    color: var(--star-white);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
    cursor: default;
  }

  ::selection{ background: var(--red-bloom); color: white; }

  /* ---------------- starfield canvas (fixed, behind everything) --------------- */
  #stars{
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    background:
      radial-gradient(ellipse 120% 80% at 50% -10%, #161c4a 0%, transparent 55%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 45%, var(--bg-soft) 100%);
  }

  main{ position: relative; z-index: 1; }

  section{
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6vh 6vw;
    text-align: center;
  }

  .eyebrow{
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--gold-soft);
    opacity: 0.85;
    margin: 0 0 1.4rem;
  }

  h1, h2{
    font-family: 'Cinzel Decorative', 'Cinzel', serif;
    font-weight: 700;
    margin: 0;
    line-height: 1.15;
  }

  /* ---------------------------- HERO ---------------------------- */
  .hero h1{
    font-size: clamp(2.4rem, 7vw, 5.2rem);
    background: linear-gradient(180deg, #ffffff 0%, var(--gold-soft) 55%, var(--gold) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 40px rgba(217, 184, 120, 0.25);
    letter-spacing: 0.02em;
  }

  .hero .subtitle{
    margin-top: 1.4rem;
    font-style: italic;
    font-size: clamp(1.1rem, 2.4vw, 1.5rem);
    color: var(--moon-silver);
    font-weight: 400;
  }

  .hero-sky-deco{
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: -1;
  }

  .scroll-cue{
    margin-top: 4rem;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-soft);
    opacity: 0.7;
    animation: floatCue 2.6s ease-in-out infinite;
  }

  @keyframes floatCue{
    0%, 100%{ transform: translateY(0); opacity:0.55; }
    50%{ transform: translateY(10px); opacity:0.95; }
  }

  /* ------------------------- FLOWER GARDEN ------------------------- */
  .garden-heading{
    font-size: clamp(1.7rem, 4.2vw, 2.6rem);
    color: var(--star-white);
    margin-bottom: 0.6rem;
  }
  .garden-sub{
    font-style: italic;
    color: var(--moon-silver);
    margin-bottom: 4rem;
    font-size: 1.15rem;
  }

  .garden-embed{
    width: min(100%, 900px);
    height: min(80vh, 640px);
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(217,184,120,0.35);
    box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 30px rgba(217,184,120,0.08);
  }

  .garden-embed iframe{
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  .flower-wrap{
    width: 86px;
    height: 150px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
  }

  .stem{
    width: 3px;
    height: 56px;
    background: linear-gradient(180deg, #6e8f5e, #2f4226);
    border-radius: 3px;
    opacity: 0;
    animation: stemGrow 1.1s ease-out forwards;
    transform-origin: bottom center;
  }

  .leaf{
    position: absolute;
    width: 22px;
    height: 12px;
    background: linear-gradient(120deg, #6e8f5e, #3a4f2e);
    border-radius: 0 100% 0 100%;
    bottom: 28px;
    opacity: 0;
    animation: leafFade 1s ease-out forwards;
  }
  .leaf.left{ left: -6px; transform: rotate(-20deg); animation-delay: .5s;}
  .leaf.right{ right: -6px; transform: rotate(20deg) scaleX(-1); animation-delay: .65s;}

  .flower{
    position: relative;
    width: 78px;
    height: 78px;
    margin-bottom: -6px;
    transform: scale(0);
    animation: bloom 1.4s cubic-bezier(.2,1.4,.4,1) forwards;
  }

  .petal{
    position: absolute;
    top: 50%; left: 50%;
    width: 30px;
    height: 46px;
    margin-top: -46px;
    margin-left: -15px;
    background: radial-gradient(ellipse at 32% 25%, var(--red-bloom-2) 0%, var(--red-bloom) 55%, #9c1c2c 100%);
    border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
    transform-origin: 50% 100%;
    filter: drop-shadow(0 0 0 rgba(232,52,74,0));
    animation: shine 3.2s ease-in-out infinite;
  }
  .petal:nth-child(1){ transform: rotate(0deg); }
  .petal:nth-child(2){ transform: rotate(60deg); }
  .petal:nth-child(3){ transform: rotate(120deg); }
  .petal:nth-child(4){ transform: rotate(180deg); }
  .petal:nth-child(5){ transform: rotate(240deg); }
  .petal:nth-child(6){ transform: rotate(300deg); }

  .flower-center{
    position: absolute;
    top: 50%; left: 50%;
    width: 22px; height: 22px;
    margin: -11px 0 0 -11px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ffeec3, var(--gold) 70%);
    box-shadow: 0 0 12px rgba(217,184,120,0.7);
    z-index: 2;
  }

  @keyframes stemGrow{
    from{ opacity:0; height:0; }
    to{ opacity:1; height:56px; }
  }
  @keyframes leafFade{
    from{ opacity:0; transform: scale(.3) rotate(0); }
    to{ opacity:1; }
  }
  @keyframes bloom{
    0%{ transform: scale(0) rotate(-8deg); }
    70%{ transform: scale(1.08) rotate(2deg); }
    100%{ transform: scale(1) rotate(0deg); }
  }
  @keyframes shine{
    0%, 100%{ filter: drop-shadow(0 0 2px var(--red-glow)) brightness(1); }
    50%{ filter: drop-shadow(0 0 16px var(--red-glow)) brightness(1.25); }
  }

  /* stagger garden + shine timings via inline custom props, see HTML */
  .flower-wrap{ animation-delay: var(--d, 0s); }
  .flower-wrap .flower{ animation-delay: var(--d, 0s); }
  .flower-wrap .petal{ animation-delay: var(--shine-d, 0s); }

  /* ----------------------------- LETTER ----------------------------- */
  .letter-heading{
    font-size: clamp(1.7rem, 4.2vw, 2.6rem);
    margin-bottom: 3.2rem;
  }

  .letter-section{
    min-height: auto;
    padding-top: 8vh;
    padding-bottom: 3vh;
  }

  .envelope-stage{
    perspective: 1400px;
    width: min(420px, 86vw);
    transition: width 1s cubic-bezier(.2,.9,.25,1);
  }

  .envelope-stage.is-open{
    width: min(640px, 92vw);
  }

  .envelope{
    position: relative;
    width: 100%;
    aspect-ratio: 3/2;
    cursor: pointer;
    user-select: none;
    transition: height 1s cubic-bezier(.2,.9,.25,1);
  }

  .envelope.open{
    aspect-ratio: unset;
    height: min(72vh, 620px);
  }

  .env-back{
    position:absolute; inset:0;
    background: linear-gradient(160deg, #1a2150, #0d1334);
    border: 1px solid rgba(217,184,120,0.35);
    border-radius: 6px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 30px rgba(217,184,120,0.08);
  }

  .env-back::before{
    content:'';
    position:absolute; inset:10px;
    border: 1px dashed rgba(217,184,120,0.25);
    border-radius: 3px;
  }

  .letter-paper{
    position:absolute;
    left: 4%; right: 4%;
    bottom: 6%;
    height: 0%;
    background:
      linear-gradient(var(--paper), var(--paper)) padding-box;
    border-radius: 6px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.45), 0 0 0 1px rgba(217,184,120,0.25);
    overflow: hidden;
    transition: height 1.1s cubic-bezier(.2,.9,.25,1), bottom 1.1s cubic-bezier(.2,.9,.25,1);
    z-index: 2;
  }

  .envelope.open .letter-paper{
    height: 90%;
    bottom: 5%;
    left: 0; right: 0;
  }

  .letter-paper-inner{
    height: 100%;
    box-sizing: border-box;
    padding: clamp(1.6rem, 5vw, 3.2rem) clamp(1.5rem, 5vw, 3rem);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    font-style: normal;
    font-weight: 500;
    font-size: clamp(1.05rem, 2vw, 1.28rem);
    line-height: 1.85;
    letter-spacing: 0.01em;
    text-align: left;
    opacity: 0;
    transition: opacity .7s ease .45s;
    white-space: pre-line;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--gold) transparent;
  }

  .letter-paper-inner::-webkit-scrollbar{ width: 6px; }
  .letter-paper-inner::-webkit-scrollbar-thumb{
    background: var(--gold);
    border-radius: 3px;
  }

  .letter-paper-inner::first-letter{
    font-family: 'Cinzel Decorative', serif;
    font-size: 2.3em;
    float: left;
    line-height: 0.85;
    padding: 0.06em 0.1em 0 0;
    color: var(--red-bloom);
  }

  .envelope.open .letter-paper-inner{ opacity: 1; }

  .env-flap{
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(160deg, #232c63, #131a40);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top center;
    transition: transform 0.9s cubic-bezier(.3,.9,.3,1);
    z-index: 4;
    border-bottom: 1px solid rgba(217,184,120,0.25);
  }

  .envelope.open .env-flap{
    transform: rotateX(180deg);
    z-index: 1;
  }

  .env-seal{
    position:absolute;
    top: 38%; left: 50%;
    width: 38px; height: 38px;
    margin: -19px 0 0 -19px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--red-bloom-2), var(--red-bloom) 70%, #7e1622 100%);
    box-shadow: 0 0 14px rgba(232,52,74,0.55);
    display:flex; align-items:center; justify-content:center;
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--gold-soft);
    z-index: 5;
    transition: opacity .4s ease, transform .4s ease;
  }
  .envelope.open .env-seal{ opacity:0; transform: scale(0.4); }

  .open-hint{
    margin-top: 1.6rem;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold-soft);
    opacity: 0.75;
  }

  /* ----------------------------- FOOTER ----------------------------- */
  footer{
    min-height: auto;
    display:flex;
    flex-direction: column;
    align-items:center;
    justify-content:center;
    gap: 0.6rem;
    padding: 2rem 6vw 4rem;
  }
  .footer-mark{
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.6rem;
    color: var(--gold-soft);
  }
  .footer-note{
    font-style: italic;
    color: var(--moon-silver);
    font-size: 1rem;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }

  /* ----------------------------- PLAY BUTTON ----------------------------- */
  .play-btn{
    position: fixed;
    top: 1.4rem;
    right: 1.4rem;
    z-index: 50;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1px solid rgba(217,184,120,0.45);
    background: rgba(11,14,46,0.75);
    backdrop-filter: blur(6px);
    color: var(--gold-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45), 0 0 0 rgba(217,184,120,0.4);
    transition: box-shadow .3s ease, transform .3s ease, border-color .3s ease;
  }
  .play-btn:hover{ transform: scale(1.06); border-color: rgba(217,184,120,0.8); }
  .play-btn.playing{ box-shadow: 0 8px 24px rgba(0,0,0,0.45), 0 0 18px rgba(217,184,120,0.55); }
  .play-btn svg{ width: 18px; height: 18px; }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- ============ MUSIC PLAYER ============
     Replace the src below with the raw GitHub link to your uploaded mp3,
     e.g. https://raw.githubusercontent.com/USERNAME/REPO/main/song.mp3 -->
<audio id="bgAudio" src="https://raw.githubusercontent.com/notyourlocalman/Denn/main/bruno_nothing.mp3" loop preload="none"></audio>
<button id="playBtn" class="play-btn" aria-label="play song" type="button">
  <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
  <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
</button>

<main>

  <!-- ============ HERO ============ -->
  <section class="hero">
    <h1 id="heroTitle">To Dennis</h1>
    <p class="subtitle" id="heroSubtitle">From the tuff guy, Sean oWrath</p>
  </section>

  <!-- ============ FLOWER GARDEN ============ -->
  <section class="garden-section">
    <h2 class="garden-heading">I made this because you're (my favorite) weirdo</h2>
    <p class="garden-sub">I can't hand you a bouquet of red flowers but I can make red flowers bloom on your screen.</p>
    <div class="garden-embed">
      <iframe src="garden.html" title="a little garden" loading="lazy"></iframe>
    </div>
  </section>

  <!-- ============ LETTER ============ -->
  <section class="letter-section">
    <h2 class="letter-heading">Ini namanya section nahan cringe</h2>
    <div class="envelope-stage" id="envelopeStage">
      <div class="envelope" id="envelope">
        <div class="letter-paper">
          <div class="letter-paper-inner" id="letterText"></div>
        </div>
        <div class="env-back"></div>
        <div class="env-flap"></div>
        <div class="env-seal">✦</div>
      </div>
    </div>
  </section>

  <footer>
    <p class="footer-note" id="footerNote">written with more nerve than I usually have</p>
  </footer>

</main>

<script>
/* =================================================================
   CONFIG — edit the text below to personalize the page.
   Nothing else in this file needs to change for basic customization.
   ================================================================= */
const CONFIG = {
  pageTitle: "For Dennis",
  heroTitle: "For Dennis",
  heroSubtitle: "From the tuff guy, Sean",

  // The letter — use \n for line breaks (paragraphs are separated by a blank line).
  letterText:
`Jauh sebelum dunia sempat mengeja namamu, semesta telah lebih dahulu memeluk kemungkinan tentang keberadaanmu. Gugusan-gugusan bintang mengorbankan dirinya berpijar, sementara langit menunaikan sebuah ikrar yang purba untuk dilafalkan, yaitu menghadirkanmu. Kehadiranmu adalah simpul tempat beribu-ribu kemungkinan akhirnya bersua, sesuatu yang terlalu megah untuk diperangkap ke dalam kata 'kebetulan'.

Maka, jangan lekas-lekas menjatuhkan murka kepada dirimu sendiri hanya lantaran dunia berkali-kali lalai memperlakukanmu dengan kelayakan yang semestinya. Dunia lebih gemar menghakimi daripada berusaha menyelami, lebih fasih menyematkan nama daripada mengenali hakikat. Bernapaslah untuk jiwamu sendiri. Jadilah dirimu yang paling utuh. Rajutlah kehidupanmu sendiri. Lakukan apa-apa yang membuat hatimu berdegup dalam bahagia.

Ketika kesunyian menjadi penghuni paling setia di keraguan yang menjalar seperti akar mencari celah, barangkali kamu akan merasa seolah tak pernah benar-benar menjadi pelabuhan, melupakan bahwa di sanalah ruang yang sengaja disediakan semesta agar seseorang akhirnya sanggup mendengar denyut jiwanya sendiri. Kesedihan adalah manuskrip yang ditulis kehidupan dengan tinta paling getir membuat siapa pun yang kelak membacanya mengerti bahwa keteguhan tidak pernah dan tidak akan terlahir dari hidup yang mudah.

Apabila suatu hari tiba, kamu kembali mempertanyakan nilai keberadaanmu, jangan lupakan bahwa ada satu hal yang tak mampu disangkal oleh waktu yaitu, semesta telah menghabiskan usia yang bahkan tak sanggup dibayangkan oleh nalar hanya untuk memastikan bahwa pada sebuah pagi yang telah lama ditakdirkan, kamu akan menarik napas pertamamu. Kamu hadir. Kamu ada. Sejak hari pertama semesta menitipkan napas itu ke dalam tubuhmu, dunia telah menjadi sedikit lebih teduh daripada sebelumnya.

-Sean`,

  footerNote: "written with more nerve than I usually have"
};

document.title = CONFIG.pageTitle;
document.getElementById('heroTitle').textContent = CONFIG.heroTitle;
document.getElementById('heroSubtitle').textContent = CONFIG.heroSubtitle;
document.getElementById('letterText').textContent = CONFIG.letterText;
document.getElementById('footerNote').textContent = CONFIG.footerNote;

/* ================= starfield + shooting stars (canvas) ================= */
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let W, H, stars = [];
const STAR_COUNT_BASE = 0.00065; // stars per px^2, scaled by area

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = document.documentElement.scrollHeight;
  canvas.style.height = H + 'px';
  buildStars();
}

function buildStars(){
  const count = Math.min(420, Math.floor(W * H * STAR_COUNT_BASE));
  stars = [];
  for(let i=0;i<count;i++){
    stars.push({
      x: Math.random()*W,
      y: Math.random()*H,
      r: Math.random()*1.4 + 0.3,
      phase: Math.random()*Math.PI*2,
      speed: Math.random()*0.015 + 0.006,
      baseAlpha: Math.random()*0.5 + 0.4
    });
  }
}

let shootingStars = [];
function maybeSpawnShootingStar(){
  if(Math.random() < 0.006 && shootingStars.length < 2){
    const startX = Math.random()*W*0.6;
    const startY = Math.random()*H*0.4;
    shootingStars.push({
      x: startX, y: startY,
      vx: 6 + Math.random()*4,
      vy: 3 + Math.random()*2,
      life: 0,
      maxLife: 60 + Math.random()*30
    });
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // twinkling stars
  for(const s of stars){
    s.phase += s.speed;
    const a = s.baseAlpha * (0.55 + 0.45*Math.sin(s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(246,244,255,${a.toFixed(3)})`;
    ctx.fill();
  }

  // shooting stars
  maybeSpawnShootingStar();
  shootingStars.forEach(sh => {
    sh.x += sh.vx;
    sh.y += sh.vy;
    sh.life++;
    const alpha = 1 - sh.life/sh.maxLife;
    const grad = ctx.createLinearGradient(sh.x, sh.y, sh.x - sh.vx*8, sh.y - sh.vy*8);
    grad.addColorStop(0, `rgba(255,255,255,${Math.max(alpha,0)})`);
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sh.x, sh.y);
    ctx.lineTo(sh.x - sh.vx*8, sh.y - sh.vy*8);
    ctx.stroke();
  });
  shootingStars = shootingStars.filter(sh => sh.life < sh.maxLife && sh.y < H + 50);

  requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
window.addEventListener('load', () => { resize(); draw(); });
// also re-measure after fonts/content settle
setTimeout(resize, 600);

/* ============================= music play button ============================= */
const bgAudio = document.getElementById('bgAudio');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');

playBtn.addEventListener('click', () => {
  if(bgAudio.paused){
    bgAudio.play().catch(() => {});
    playIcon.style.display = 'none';
    pauseIcon.style.display = '';
    playBtn.classList.add('playing');
  } else {
    bgAudio.pause();
    playIcon.style.display = '';
    pauseIcon.style.display = 'none';
    playBtn.classList.remove('playing');
  }
});

/* ============================= envelope ============================= */
const envelope = document.getElementById('envelope');
const envelopeStage = document.getElementById('envelopeStage');
envelope.addEventListener('click', () => {
  const willOpen = !envelope.classList.contains('open');
  if(willOpen){
    envelopeStage.classList.add('is-open');
    envelope.classList.add('open');
  } else {
    envelope.classList.remove('open');
    setTimeout(() => envelopeStage.classList.remove('is-open'), 1100);
  }
});

</script>

</body>
</html>
